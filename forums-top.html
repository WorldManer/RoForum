<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>RoForum · Топ публикаций</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <a href="index.html" class="logo-link">
                <span class="logo-text">RoForum</span>
            </a>
            <a href="index.html" class="btn-top">Главная</a>
            <a href="forums.html" class="btn-top">Форумы</a>
            <a href="forums-top.html" class="btn-top">Топ</a>
            <a href="rules.html" class="btn-top">Правила</a>
        </div>
        <div class="topbar-right" id="authButtons">
            <a href="login.html" class="btn-top">Войти</a>
            <a href="register.html" class="btn-top">Регистрация</a>
        </div>
        <div class="topbar-right" id="userPanel" style="display:none;">
            <a href="profile.html" class="btn-top" id="usernameDisplay"></a>
            <a href="settings-site.html" class="btn-top">Настройки</a>
            <a href="#" class="btn-top" id="logoutBtn">Выйти</a>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <a href="forums.html" class="sidebar-item">Все форумы</a>
            <a href="forums-top.html" class="sidebar-item">Топ публикаций</a>
            <a href="create-forum.html" class="sidebar-item">Создать пост</a>
            <a href="settings-site.html" class="sidebar-item">Настройки</a>
        </aside>

        <main class="content">
            <div class="forums-header">
                <h1>Топ публикаций</h1>
                <p class="subtitle">Последние 5 публикаций</p>
            </div>

            <div id="topForumsList" class="forums-list"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="1x5oe.js"></script>
    <script src="1x4oe.js"></script>
    <script src="1x3oe.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth();
            const authButtons = document.getElementById('authButtons');
            const userPanel = document.getElementById('userPanel');
            const usernameDisplay = document.getElementById('usernameDisplay');
            const logoutBtn = document.getElementById('logoutBtn');

            if (user) {
                authButtons.style.display = 'none';
                userPanel.style.display = 'flex';
                usernameDisplay.textContent = user.username;
                if (user.role === 'admin' || user.role === 'owner') {
                    usernameDisplay.textContent += ' ⚔️';
                }
            }

            if (logoutBtn) {
                logoutBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    const token = localStorage.getItem('session_token');
                    if (token) {
                        await supabase.from('sessions').delete().eq('token', token);
                    }
                    localStorage.removeItem('session_token');
                    window.location.href = '/index.html';
                });
            }

            const forums = await getRecentForums(5);
            const container = document.getElementById('topForumsList');

            if (forums.length === 0) {
                container.innerHTML = '<p>Публикаций пока нет.</p>';
                return;
            }

            forums.forEach(forum => {
                const card = document.createElement('div');
                card.className = 'forum-card';
                card.innerHTML = `
                    <h3><a href="forum-post.html?id=${forum.id}">${forum.title}</a></h3>
                    <p class="forum-meta">
                        Автор: <a href="profile.html?id=${forum.author_id}">${forum.accounts.username}${forum.accounts.role === 'admin' || forum.accounts.role === 'owner' ? ' ⚔️' : ''}</a>
                        · ${new Date(forum.created_at).toLocaleDateString('ru-RU')}
                    </p>
                    <p class="forum-preview">${forum.content.substring(0, 200)}${forum.content.length > 200 ? '...' : ''}</p>
                    ${forum.tags && forum.tags.length > 0 ? `<div class="forum-tags">${forum.tags.map(tag => `<span class="tag">#${tag}</span>`).join(' ')}</div>` : ''}
                `;
                container.appendChild(card);
            });
        });
    </script>
</body>
</html>
